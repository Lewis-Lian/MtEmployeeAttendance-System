{% set picker_title = picker_title|default("选择员工") %}
{% set picker_search_placeholder = picker_search_placeholder|default("搜索员工编号/姓名") %}
<div class="modal fade employee-picker-modal" id="employeePickerModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-xl modal-dialog-scrollable">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">{{ picker_title }}</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">
        <div class="row g-3 employee-picker-layout">
          <div class="col-lg-7 d-flex flex-column gap-2">
            <div class="employee-picker-panel employee-picker-tree">
              <div class="employee-picker-panel-title">部门树</div>
              <div class="list-group employee-dept-list" id="employeePickerDeptList"></div>
            </div>
            <div class="employee-picker-panel employee-picker-candidates">
              <div class="d-flex align-items-center gap-2 mb-2">
                <label class="form-check-label small d-inline-flex align-items-center gap-1 text-nowrap">
                  <input class="form-check-input m-0" type="checkbox" id="employeePickerSelectVisible">
                  全选
                </label>
                <input type="text" class="form-control form-control-sm" id="employeePickerSearchInput" placeholder="{{ picker_search_placeholder }}">
              </div>
              <div class="employee-picker-list" id="employeePickerList">
                {% for e in employees %}
                <label
                  class="employee-picker-row"
                  data-id="{{ e.id }}"
                  data-name="{{ e.name }}"
                  data-key="{{ e.emp_no }} {{ e.name }}"
                  data-dept-id="{{ e.dept_id if e.dept_id else '' }}"
                  data-parent-id="{{ e.department.parent_id if e.department and e.department.parent_id else '' }}"
                  data-dept-name="{{ e.department.dept_name if e.department else '未分配部门' }}"
                >
                  <input class="form-check-input employee-picker-item" type="checkbox" value="{{ e.id }}" data-id="{{ e.id }}">
                  <span class="employee-picker-main">{{ e.emp_no }} - {{ e.name }}</span>
                </label>
                {% endfor %}
              </div>
            </div>
          </div>
          <div class="col-lg-5">
            <div class="employee-picker-panel employee-picker-selected-wrap">
              <div class="d-flex align-items-center justify-content-between mb-2">
                <div class="employee-picker-panel-title mb-0">已选人员</div>
                <div class="d-flex align-items-center gap-2">
                  <span class="badge text-bg-light border" id="employeePickerSelectedCount">已选 0 人</span>
                  <button type="button" class="btn btn-sm btn-outline-secondary" id="employeePickerClearBtn">清空</button>
                </div>
              </div>
              <div class="employee-selected-list" id="employeePickerSelectedList">
                <div class="employee-selected-empty">暂无已选人员</div>
              </div>
            </div>
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">取消</button>
        <button type="button" class="btn btn-primary" id="employeePickerConfirmBtn">确定</button>
      </div>
    </div>
  </div>
</div>
