<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>登录 - 考勤系统</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet">
</head>
<body class="login-page">
<div class="login-shell page-wrap">
  <section class="login-hero">
    <div class="login-brand">
      <span class="brand-dot"></span>
      <span>考勤数据处理系统</span>
    </div>
    <h1 class="login-hero-title">统一处理考勤与主数据</h1>
    <p class="login-hero-subtitle">面向账套、员工、部门与打卡结果的统一管理入口。</p>
    <div class="login-hero-points">
      <div class="login-hero-point">
        <span class="login-hero-point-icon"></span>
        <span>账套计算与查询分离</span>
      </div>
      <div class="login-hero-point">
        <span class="login-hero-point-icon"></span>
        <span>人员、部门与权限统一维护</span>
      </div>
    </div>
  </section>
  <section class="login-panel-wrap">
    <div class="card login-card">
      <div class="card-body">
        <div class="login-panel-top">
          <div class="login-panel-kicker">欢迎登录</div>
          <h2 class="login-panel-title">账号登录</h2>
          <p class="login-panel-subtitle">请输入用户名和密码进入系统。</p>
        </div>
        {% if error %}
          <div class="alert alert-danger py-2">{{ error }}</div>
        {% endif %}
        <form method="post" action="/login" class="login-form">
          <div class="mb-3">
            <label class="form-label">用户名</label>
            <input type="text" class="form-control" name="username" placeholder="请输入用户名" required>
          </div>
          <div class="mb-4">
            <label class="form-label">密码</label>
            <div class="login-password-field">
              <input type="password" class="form-control" name="password" id="loginPasswordInput" placeholder="请输入密码" required>
              <button class="login-eye-btn" type="button" id="toggleLoginPasswordBtn" aria-label="显示密码">
                <span class="login-eye-icon" aria-hidden="true"></span>
              </button>
            </div>
          </div>
          <button type="submit" class="btn btn-primary w-100 login-submit-btn">登录系统</button>
        </form>
        <div class="login-panel-footnote">仅限授权账号访问，所有操作将按角色范围控制。</div>
      </div>
    </div>
  </section>
  <div class="login-backdrop-orb orb-left"></div>
  <div class="login-backdrop-orb orb-right"></div>
</div>
<script>
  document.addEventListener("DOMContentLoaded", function () {
    const input = document.getElementById("loginPasswordInput");
    const btn = document.getElementById("toggleLoginPasswordBtn");
    if (!input || !btn) return;
    btn.addEventListener("click", function () {
      const visible = input.type === "text";
      input.type = visible ? "password" : "text";
      btn.setAttribute("aria-label", visible ? "显示密码" : "隐藏密码");
      btn.classList.toggle("is-visible", !visible);
    });
  });
</script>
</body>
</html>
